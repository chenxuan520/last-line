services:
  last-line:
    build: .
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env.standalone
    environment:
      SERVER_MODE: standalone
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8787
      SERVER_DATA_DIR: /data
      SERVER_STATIC_DIR: /app/dist
    ports:
      - "${LAST_LINE_PORT:-8787}:8787"
    volumes:
      - last-line-data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  last-line-data:
