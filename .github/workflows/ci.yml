name: CI and GitHub Pages

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_MULTIPLAYER_ENABLED: "false"
          VITE_MULTIPLAYER_URL: ""
        run: npm run build

      - name: Build Worker
        run: npm run build:worker

      - name: Build standalone server
        run: npm run build:server

      - name: Check performance budgets
        run: npm run check:budgets

      - name: Build Docker image
        run: docker build --tag "last-line-ci:${GITHUB_SHA}" .

      - name: Smoke test Docker image
        env:
          CONTAINER_NAME: last-line-ci-${{ github.run_id }}-${{ github.run_attempt }}
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            status=$?
            trap - EXIT
            if [[ "$status" -ne 0 ]]; then
              printf 'Docker smoke test failed; container logs:\n' >&2
              docker logs "$CONTAINER_NAME" >&2 || true
            fi
            docker rm --force "$CONTAINER_NAME" >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT

          docker run --detach \
            --name "$CONTAINER_NAME" \
            --init \
            --read-only \
            --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /data:rw,noexec,nosuid,size=64m \
            --publish "127.0.0.1::8787" \
            "last-line-ci:${GITHUB_SHA}"

          port_binding="$(docker port "$CONTAINER_NAME" 8787/tcp)"
          [[ "$port_binding" == 127.0.0.1:* ]]
          host_port="${port_binding##*:}"
          [[ "$host_port" =~ ^[0-9]+$ ]]

          health_json=""
          health_ready=false
          for attempt in {1..30}; do
            if health_json="$(curl --fail --silent --show-error "http://127.0.0.1:${host_port}/health" 2>/dev/null)"; then
              health_ready=true
              break
            fi
            sleep 1
          done
          if [[ "$health_ready" != true ]]; then
            printf 'Health endpoint did not become ready\n' >&2
            exit 1
          fi
          if [[ "$health_json" != '{"ok":true,"service":"lastlinep2p"}' ]]; then
            printf 'Unexpected health response: %s\n' "$health_json" >&2
            exit 1
          fi

      - name: Clean up Docker smoke container
        if: always()
        env:
          CONTAINER_NAME: last-line-ci-${{ github.run_id }}-${{ github.run_attempt }}
        run: docker rm --force "$CONTAINER_NAME" >/dev/null 2>&1 || true

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Package release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: zip -r "last-line-${GITHUB_REF_NAME}.zip" dist

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: last-line-${{ github.ref_name }}.zip
          if-no-files-found: error
          retention-days: 1

  deploy-github-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: release-dist

      - name: Create GitHub Release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "release-dist/last-line-${GITHUB_REF_NAME}.zip" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
